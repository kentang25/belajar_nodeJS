<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reading Book List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="max-w-2xl mx-auto p-4">

        <section class="bg-blue-400 p-6 rounded-xl shadow-lg">

            <h1 class="text-2xl md:text-4xl text-white font-bold drop-shadow-lg pb-4 underline decoration-white">
                Reading Book List
            </h1>

            
            <div class="flex flex-col md:flex-row gap-3">

                <input id="task" placeholder="Masukkan todo"
                    class="border-2 border-gray-300 bg-white p-3 rounded w-full">

                <input type="date" id="dueDate" class="border-2 border-gray-300 bg-white p-3 rounded w-full md:w-auto">

                <button
                    class="bg-white px-4 py-3 rounded hover:bg-orange-300 cursor-pointer text-black transition w-full md:w-auto"
                    onclick="addTodo()">
                    Tambah
                </button>

            </div>

            <ul id="list" class="space-y-3 mt-6"></ul>

        </section>

    </div>

    <script>

        function formatDate(datestring)
        {
            const date = new Date(datestring);
            const dat = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${year}-${month}-${dat}`;
        }
        
        async function loadTodos() {
            const res = await fetch('/todos');
            const todos = await res.json();

            const list = document.getElementById('list');
            list.innerHTML = '';

            todos.forEach(todo => {

                const li = document.createElement('li');

                li.className = `
        flex flex-col md:flex-row
        md:justify-between
        md:items-center
        bg-white
        p-4
        rounded
        shadow-md
        gap-3
        `;

                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-semibold">${todo.task}</span>
                        ${todo.dueDate ? `<span class="text-sm text-gray-500">📅 ${formatDate(todo.dueDate)}</span>` : ''}
                    </div>
                `;


                const deleteBtn = document.createElement('button');

                deleteBtn.textContent = 'Hapus';

                deleteBtn.className = 'bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 w-full md:w-auto';

                deleteBtn.onclick = async () => {
                    await fetch(`/todos/${todo.id}`, { method: 'DELETE' });
                    loadTodos();
                };

                li.appendChild(deleteBtn);
                list.appendChild(li);

            });
        }

        async function addTodo() {

            const task = document.getElementById('task').value;
            const dueDate = document.getElementById('dueDate').value;

            await fetch('/todos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ task, dueDate })
            });

            document.getElementById('task').value = '';
            document.getElementById('dueDate').value = '';

            loadTodos();
        }

        loadTodos();

    </script>

</body>

</html>
